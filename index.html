<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Ludo</title>

<style>

body{
background:#1e1e1e;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

#board{
display:grid;
grid-template-columns:repeat(10,40px);
grid-gap:4px;
justify-content:center;
margin-top:20px;
}

.casa{
width:40px;
height:40px;
background:#444;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:6px;
}

.vermelho{background:red;}
.azul{background:blue;}
.verde{background:green;}
.amarelo{background:gold;color:black;}

button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎲 Mini Ludo</h1>

<p id="turno">Vez do jogador 1</p>

<div id="board"></div>

<button onclick="rolar()">Rolar dado</button>

<p id="dado"></p>

<script>

const tabuleiro = document.getElementById("board")

for(let i=0;i<50;i++){

let casa=document.createElement("div")
casa.className="casa"
casa.id="casa"+i
tabuleiro.appendChild(casa)

}

let jogadores=[
{pos:0,cor:"vermelho"},
{pos:0,cor:"azul"},
{pos:0,cor:"verde"},
{pos:0,cor:"amarelo"}
]

let turno=0

function desenhar(){

document.querySelectorAll(".casa").forEach(c=>{
c.className="casa"
c.textContent=""
})

jogadores.forEach(j=>{
let c=document.getElementById("casa"+j.pos)
c.classList.add(j.cor)
c.textContent="●"
})

}

function rolar(){

let numero=Math.floor(Math.random()*6)+1

document.getElementById("dado").textContent="🎲 "+numero

jogadores[turno].pos+=numero

if(jogadores[turno].pos>=49){
alert("🏆 Jogador "+(turno+1)+" venceu!")
location.reload()
return
}

turno++

if(turno>3)turno=0

document.getElementById("turno").textContent="Vez do jogador "+(turno+1)

desenhar()

}

desenhar()

</script>

</body>
</html>
