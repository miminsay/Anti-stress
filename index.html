<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mini Ludo</title>

<style>
body{
font-family:Arial;
background:#222;
color:white;
text-align:center;
}

h1{
margin-top:10px;
}

#board{
display:grid;
grid-template-columns:repeat(10,50px);
grid-template-rows:repeat(10,50px);
gap:3px;
justify-content:center;
margin-top:20px;
}

.cell{
background:#444;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.player1{background:red;}
.player2{background:blue;}
.player3{background:green;}
.player4{background:yellow;color:black;}

button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎲 Mini Ludo</h1>
<p id="turn">Vez do Jogador 1</p>

<div id="board"></div>

<button onclick="rollDice()">Rolar Dado 🎲</button>
<p id="dice"></p>

<script>

let board=document.getElementById("board")

for(let i=0;i<100;i++){
let cell=document.createElement("div")
cell.className="cell"
cell.id="c"+i
board.appendChild(cell)
}

let players=[
{pos:0,class:"player1"},
{pos:0,class:"player2"},
{pos:0,class:"player3"},
{pos:0,class:"player4"}
]

let turn=0

function drawPlayers(){

document.querySelectorAll(".cell").forEach(c=>{
c.classList.remove("player1","player2","player3","player4")
c.textContent=""
})

players.forEach((p,i)=>{
let cell=document.getElementById("c"+p.pos)
cell.classList.add(p.class)
cell.textContent="●"
})

}

function rollDice(){

let dice=Math.floor(Math.random()*6)+1
document.getElementById("dice").textContent="Saiu: "+dice

players[turn].pos+=dice

if(players[turn].pos>=99){
alert("Jogador "+(turn+1)+" venceu! 🏆")
location.reload()
}

turn++
if(turn>3)turn=0

document.getElementById("turn").textContent="Vez do Jogador "+(turn+1)

drawPlayers()

}

drawPlayers()

</script>

</body>
</html>
