<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mini Ludo</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#1e1e2f;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(20,40px);
gap:4px;
justify-content:center;
margin:30px;
}

.casa{
width:40px;
height:40px;
background:#444;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff5c8a;
color:white;
}

</style>
</head>

<body>

<h1>Mini Ludo 🎲</h1>

<div id="board"></div>

<h2 id="info">Vez do jogador 🔴</h2>

<button onclick="rolar()">Rolar Dado</button>

<script>

let pos1 = 0
let pos2 = 0
let turno = 1

const board = document.getElementById("board")

function desenhar(){

board.innerHTML=""

for(let i=0;i<20;i++){

let casa = document.createElement("div")
casa.className="casa"

if(i===pos1) casa.innerHTML+="🔴"
if(i===pos2) casa.innerHTML+="🔵"

board.appendChild(casa)

}

}

function rolar(){

let dado = Math.floor(Math.random()*6)+1

if(turno===1){
pos1 += dado
if(pos1>=19){
alert("🔴 venceu!")
location.reload()
}
turno=2
document.getElementById("info").innerText="Vez do jogador 🔵"
}else{

pos2 += dado
if(pos2>=19){
alert("🔵 venceu!")
location.reload()
}
turno=1
document.getElementById("info").innerText="Vez do jogador 🔴"

}

desenhar()

alert("Saiu "+dado)

}

desenhar()

</script>

</body>
</html>
